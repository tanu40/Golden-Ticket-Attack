<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>CTF: Golden Ticket Attack Detection | Kerberos TGT Forgery</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Fira Code', system-ui, monospace; }
    body {
      background: linear-gradient(160deg, #0a0010 0%, #200030 50%, #0a0010 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 1.5rem; margin: 0;
    }
    .container {
      max-width: 1200px; width: 100%; background: rgba(15, 5, 35, 0.95);
      backdrop-filter: blur(28px); border: 1px solid rgba(255, 215, 0, 0.4);
      box-shadow: 0 25px 50px rgba(255, 200, 0, 0.25); border-radius: 2.5rem;
      padding: 2rem; color: #e0d4f0;
    }
    h1 { font-size: 2.2rem; font-weight: 700; text-align: center; background: linear-gradient(135deg, #ffd700, #cc9900); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.4rem; letter-spacing: 1px; }
    .subtitle { text-align: center; color: #c0b090; margin-bottom: 1.8rem; border-bottom: 1px dashed #504020; padding-bottom: 1rem; font-style: italic; }
    .panel { background: rgba(10, 5, 25, 0.9); backdrop-filter: blur(12px); border-radius: 1.8rem; padding: 1.7rem; border: 1px solid #504020; margin-bottom: 1.8rem; }
    .hidden { display: none !important; }
    input, button { background: #1a0a28; border: 1px solid #6a4080; border-radius: 2rem; padding: 0.7rem 1.3rem; color: #e0d0f0; font-weight: 500; outline: none; font-size: 0.9rem; }
    input:focus { border-color: #ffd700; box-shadow: 0 0 14px #cc9900; }
    button { background: #2a1028; border-color: #cc8800; cursor: pointer; font-weight: bold; display: inline-flex; align-items: center; gap: 0.3rem; }
    button:hover { background: #3a1830; border-color: #ffd700; box-shadow: 0 0 18px #cc9900; }
    .task-card { background: #0d0518; border-left: 6px solid #ffd700; padding: 1.2rem; border-radius: 1.3rem; margin: 1.2rem 0; animation: fadeIn 0.35s ease; }
    @keyframes fadeIn { 0% { opacity: 0; transform: translateY(8px); } 100% { opacity: 1; transform: translateY(0); } }
    .log-line { background: #0a0315; border: 1px solid #2a1540; padding: 0.5rem 1rem; border-radius: 0.6rem; margin: 0.4rem 0; font-family: 'Fira Code', monospace; font-size: 0.78rem; white-space: pre-wrap; color: #c0a8e0; }
    .badge { background: #2a1540; padding: 0.2rem 0.9rem; border-radius: 20px; font-size: 0.8rem; }
    .timeline-container { background: #0a0315; border: 2px solid #ffd700; border-radius: 1.5rem; padding: 1.5rem; margin: 1rem 0; position: relative; min-height: 300px; }
    .timeline-bar { position: absolute; left: 50px; top: 0; bottom: 0; width: 4px; background: #504020; }
    .timeline-event { position: relative; margin: 1.5rem 0 1.5rem 80px; padding: 1rem; border-radius: 1rem; border: 1px solid; animation: slideRight 0.5s ease; }
    @keyframes slideRight { from{transform:translateX(-20px);opacity:0} to{transform:translateX(0);opacity:1} }
    .timeline-event::before { content: ""; position: absolute; left: -36px; top: 20px; width: 16px; height: 16px; border-radius: 50%; border: 3px solid; }
    .event-compromise { background: #1a0510; border-color: #ff4444; animation-delay: 0s; }
    .event-compromise::before { background: #ff4444; border-color: #ff4444; }
    .event-lsass { background: #1a0a00; border-color: #ff8800; animation-delay: 0.5s; }
    .event-lsass::before { background: #ff8800; border-color: #ff8800; }
    .event-forge { background: #1a1000; border-color: #ffcc00; animation-delay: 1s; }
    .event-forge::before { background: #ffcc00; border-color: #ffcc00; }
    .event-logon { background: #1a0010; border-color: #ff00ff; animation-delay: 1.5s; }
    .event-logon::before { background: #ff00ff; border-color: #ff00ff; }
    .event-detect { background: #001a10; border-color: #44ff44; animation-delay: 2s; }
    .event-detect::before { background: #44ff44; border-color: #44ff44; }
    .flag-box { background: #1a0020; border: 2px dashed #ffd700; padding: 0.9rem; border-radius: 20px; text-align: center; font-weight: bold; font-size: 1.4rem; letter-spacing: 3px; color: #ffd700; animation: glowGold 1.7s infinite; }
    @keyframes glowGold { 0%{box-shadow:0 0 5px #ffd700} 50%{box-shadow:0 0 30px #ffaa00} 100%{box-shadow:0 0 5px #ffd700} }
    .success-msg { color: #9effb7; font-weight: bold; }
    .toast { position: fixed; top: 20px; right: 20px; background: #1a0a30; border: 1px solid #ffd700; padding: 1rem 1.5rem; border-radius: 2rem; color: #e0d0f0; font-weight: bold; z-index: 9999; animation: slideIn 0.3s ease, fadeOut 0.3s 2.5s forwards; }
    @keyframes slideIn { from{transform:translateX(100px);opacity:0} to{transform:translateX(0);opacity:1} }
    @keyframes fadeOut { to{opacity:0;transform:translateY(-10px)} }
    code { background: #1a0a28; padding: 0.2rem 0.6rem; border-radius: 12px; font-family: 'Fira Code', monospace; }
  </style>
</head>
<body>
<div class="container" id="appContainer">

  <div id="loginSection">
    <h1>👑 GOLDEN TICKET HUNTER</h1>
    <div class="subtitle">Golden Ticket Attack Detection · Kerberos TGT Forgery</div>
    <div class="panel">
      <div style="text-align:center;">
        <input type="text" id="studentNameInput" placeholder="Enter your name" autocomplete="off" style="width:70%;">
        <input type="password" id="studentPassInput" placeholder="Enter password" style="width:70%; margin-top:0.7rem;">
        <button id="studentSubmitLogin" style="margin-top:0.8rem;">🔐 Enter CTF Lab</button>
        <p style="font-size:0.8rem; color:#c0b090; margin-top:0.5rem;">
          Password: <code>45_2026</code>
        </p>
      </div>
    </div>
  </div>

  <div id="studentDashboard" class="hidden">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h2 style="color:#ffd700;">👤 <span id="displayStudentName"></span></h2>
      <button id="logoutStudentBtn">🚪 Logout</button>
    </div>
    <div id="taskContainer"></div>
  </div>

</div>

<script>
(function() {
    const FIXED_PASSWORD = '45_2026';
    const STORAGE_KEY = 'golden_ctf_progress';
    
    let currentUser = null;
    let completedTasks = [];

    function loadProgress() {
        try { const s=localStorage.getItem(STORAGE_KEY); if(s){const d=JSON.parse(s); completedTasks=d.completed||[]; return d.name; } } catch(e) {}
        return null;
    }
    function saveProgress() { if(currentUser) localStorage.setItem(STORAGE_KEY, JSON.stringify({name:currentUser.name, completed:currentUser.completedTasks})); }

    const tasks = [
      { id: 1, title: "👑 Task 1: Recognize Golden Ticket", desc: "What is missing that indicates forged TGT? (Event ID number)", answer: "4768", extra: "indicator" },
      { id: 2, title: "🔑 Task 2: KRBTGT Compromise", desc: "What account hash was dumped to forge tickets?", answer: "krbtgt", extra: "krbtgt" },
      { id: 3, title: "🔄 Task 3: Reset KRBTGT", desc: "How many times should KRBTGT password be reset?", answer: "2", extra: "reset" },
      { id: 4, title: "🔍 Task 4: Hunt Forged Tickets", desc: "Which Event ID shows TGS anomalies? (number)", answer: "4769", extra: "hunt" },
      { id: 5, title: "🛡️ Task 5: Rebuild DCs", desc: "What must be rebuilt after Golden Ticket? (two words)", answer: "domain controllers", extra: "rebuild" }
    ];

    const eventLogs = [
      "❌ MISSING: Event 4768 (AS-REQ) - No TGT request found!",
      "✅ Event 4624: Logon Type 3 | jsmith | 10.99.99.99 → DC01",
      "✅ Event 4624: Logon Type 3 | jsmith | 10.99.99.99 → DC02",
      "✅ Event 4672: Special Privileges assigned to jsmith",
      "⚠️ Event 4769: TGS-REQ | jsmith → CIFS/DC01 (suspicious)",
      "⚠️ Event 4769: TGS-REQ | jsmith → LDAP/DC01 (unusual SPN)",
      "🔑 LSASS Dump detected 2 hours earlier on DC01",
      "🔑 KRBTGT hash potentially compromised!"
    ];

    function showToast(m, e) {
      const x=document.querySelector('.toast'); if(x)x.remove();
      const t=document.createElement('div'); t.className='toast';
      t.style.background=e?'#3a1a1a':'#1a0a30'; t.style.borderColor=e?'#aa3030':'#ffd700';
      t.style.color=e?'#ffaaaa':'#e0d0f0'; t.textContent=m;
      document.body.appendChild(t); setTimeout(()=>{if(t.parentNode)t.remove();},3000);
    }

    function createTimeline() {
      let h='<p style="color:#ffd700;">⏱️ Golden Ticket Attack Timeline:</p>';
      h+='<div class="timeline-container" style="position:relative;min-height:350px;">';
      h+='<div class="timeline-bar"></div>';
      h+='<div class="timeline-event event-compromise"><strong>🔴 T0: Initial Compromise</strong><br><span style="font-size:0.75rem;">Attacker gains access via phishing</span></div>';
      h+='<div class="timeline-event event-lsass"><strong>🟠 T+2h: LSASS Dump</strong><br><span style="font-size:0.75rem;">Mimikatz extracts KRBTGT hash</span></div>';
      h+='<div class="timeline-event event-forge"><strong>🟡 T+3h: Golden Ticket Forged</strong><br><span style="font-size:0.75rem;">TGT created with KRBTGT hash</span></div>';
      h+='<div class="timeline-event event-logon"><strong>🟣 T+3.5h: Suspicious Logons</strong><br><span style="font-size:0.75rem;">Event 4624 - No AS-REQ (4768 missing!)</span></div>';
      h+='<div class="timeline-event event-detect"><strong>🟢 T+4h: Detection</strong><br><span style="font-size:0.75rem;">SOC identifies Golden Ticket indicators</span></div>';
      h+='</div>';
      return h;
    }

    function renderTasks() {
      if(!currentUser) return;
      document.getElementById('displayStudentName').innerText=currentUser.name;
      const c=document.getElementById('taskContainer'), done=currentUser.completedTasks||[];
      let h='<h3>👑 Golden Ticket Investigation Dashboard</h3>';
      h+=createTimeline();
      h+='<p style="color:#ffd700;">📋 Security Event Logs:</p>';
      eventLogs.forEach(l=>{
        const color=l.includes('MISSING')?'#ff4444':l.includes('LSASS')||l.includes('KRBTGT')?'#ff8800':l.includes('⚠️')?'#ffcc00':'#44dd44';
        h+=`<div class="log-line" style="border-left:3px solid ${color};">${l}</div>`;
      });
      tasks.forEach(t=>{
        const dn=done.includes(t.id);
        h+=`<div class="task-card" style="border-left-color:${dn?'#2ecc71':'#ffd700'};"><strong>${t.title}</strong> <span class="badge">${dn?'✅ Done':'🔒 Pending'}</span><p>${t.desc}</p>`;
        if(t.extra==='indicator'){
          h+='<div class="log-line">🔍 Golden Ticket: TGT forged offline → No AS-REQ (Event 4768) needed</div>';
          h+='<div class="log-line">⚠️ Logon Type 3 from unusual workstation is suspicious</div>';
        } else if(t.extra==='reset'){
          h+='<div class="log-line">🔄 Reset KRBTGT password TWICE to invalidate all existing tickets</div>';
          h+='<div class="log-line">⏰ Wait for replication between resets (allow ticket lifetime)</div>';
        } else if(t.extra==='rebuild'){
          h+='<div class="log-line">🏗️ After KRBTGT reset, rebuild Domain Controllers from clean media</div>';
          h+='<div class="log-line">🔒 Review all privileged account passwords</div>';
        }
        if(!dn) h+=`<div style="display:flex;gap:0.5rem;margin-top:0.5rem;"><input type="text" id="ai${t.id}" placeholder="Your answer" style="flex:1;"><button onclick="window.submitT(${t.id})">✅ Submit</button></div>`;
        else h+='<p class="success-msg">✔ Completed</p>';
        h+='</div>';
      });
      if(done.length===tasks.length) h+='<div class="flag-box">🏆 FLAG{GOLDEN_TICKET} 🏆</div>';
      c.innerHTML=h;
    }

    window.submitT = id => {
      if(!currentUser) return;
      const inp=document.getElementById('ai'+id); if(!inp) return;
      const a=inp.value.trim(), t=tasks.find(x=>x.id===id); if(!t) return;
      let ok=a.toLowerCase()===t.answer.toLowerCase();
      if(ok){if(!currentUser.completedTasks.includes(id)){currentUser.completedTasks.push(id);saveProgress();}showToast('✅ Correct!');renderTasks();}
      else{showToast('❌ Incorrect.',true);inp.style.animation='shake 0.5s ease';setTimeout(()=>inp.style.animation='',500);}
    };

    function showLogin(){document.getElementById('loginSection').classList.remove('hidden');document.getElementById('studentDashboard').classList.add('hidden');currentUser=null;}
    function showDash(){document.getElementById('loginSection').classList.add('hidden');document.getElementById('studentDashboard').classList.remove('hidden');renderTasks();}

    document.addEventListener('DOMContentLoaded',()=>{
      const sn=loadProgress(); if(sn) document.getElementById('studentNameInput').value=sn;
      document.getElementById('studentSubmitLogin').addEventListener('click',()=>{
        const n=document.getElementById('studentNameInput').value.trim();
        const p=document.getElementById('studentPassInput').value.trim();
        if(!n||!p){showToast('Enter name and password.',true);return;}
        if(p!==FIXED_PASSWORD){showToast('Invalid password. Use: 45_2026',true);return;}
        currentUser={name:n,completedTasks:[...completedTasks]};
        document.getElementById('studentPassInput').value=''; showDash();
      });
      document.getElementById('logoutStudentBtn').addEventListener('click',()=>{showToast('Logged out.');showLogin();});
      const s=document.createElement('style');s.textContent='@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-10px)}75%{transform:translateX(10px)}}';
      document.head.appendChild(s); showLogin();
    });
})();
</script>
</body>
</html>
